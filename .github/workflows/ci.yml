name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags for setuptools-scm

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile check
        run: python -m compileall -q src tests

      - name: Test
        run: pytest -q

  test-databases:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: xrouter
          POSTGRES_PASSWORD: xrouter
          POSTGRES_DB: xrouter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: xrouter
          MYSQL_PASSWORD: xrouter
          MYSQL_DATABASE: xrouter_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres,mysql]"

      - name: Test (SQLite + PostgreSQL + MySQL)
        env:
          TEST_POSTGRES_URL: postgresql+psycopg://xrouter:xrouter@localhost/xrouter_test
          TEST_MYSQL_URL: mysql+pymysql://xrouter:xrouter@localhost/xrouter_test
        run: pytest -q tests/test_store.py tests/test_alembic.py -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags for setuptools-scm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Verify bundled data files are in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          required = [
              "xrouter_llm/resources/models/irt_router_350k.joblib",
              "xrouter_llm/resources/config/routers/auto.yaml",
              "xrouter_llm/resources/routerbench_public_benchmarks.json",
              "xrouter_llm/migrations/env.py",
              "xrouter_llm/migrations/versions/0001_initial_calls_table.py",
          ]
          missing = [r for r in required if r not in names]
          models = [n for n in names if n.startswith("xrouter_llm/resources/config/models/") and n.endswith(".yaml")]
          if missing:
              sys.exit(f"missing from wheel: {missing}")
          expected = len(glob.glob("src/xrouter_llm/resources/config/models/*.yaml"))
          if len(models) != expected:
              sys.exit(f"expected {expected} bundled model profiles (source registry), found {len(models)}")
          print(f"OK: joblib + {len(models)} model profiles + router configs + migrations bundled in {whl}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
