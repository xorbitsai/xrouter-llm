# Higher-completion lane: allow a second model when the predicted probability
# that at least one model completes clears the threshold.
name: quality-pair
description: Route one or two models for higher completion.
completion_threshold: 0.8
lambda_cost: 1.0
max_k: 2
fallback_quality_margin: 0.05
models:
  - anthropic/claude-opus-4.8
  - anthropic/claude-sonnet-5
  - deepseek/deepseek-v4-pro
  - deepseek/deepseek-v4-flash
  - google/gemini-3.1-pro-preview
  - google/gemini-3.5-flash
  - google/gemini-3.1-flash-lite
  - minimax/minimax-m3
  - moonshotai/kimi-k2.7-code
  - z-ai/glm-4.7
  - z-ai/glm-5.2
  - openai/gpt-5.5
  - openai/gpt-5.4-mini
