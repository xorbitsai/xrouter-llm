# A router config = a named candidate set (1 or N models) + policy knobs.
# Load a directory of these with: serve --routers-dir config/routers
# The "auto" config routes across all supported models, cheapest-that-completes.
name: auto
description: Route across all supported models; pick the cheapest predicted to complete.
completion_threshold: 0.7      # predicted completion-probability cutoff
lambda_cost: 1.0
max_k: 1                        # 1 = single model; >1 enables fusion candidate sets
fallback_quality_margin: 0.05  # if none clear the cutoff, take the cheapest model
                               # within this margin of the best completion, not
                               # the priciest highest-completion one
models:
  - anthropic/claude-opus-4.8
  - anthropic/claude-sonnet-5
  - deepseek/deepseek-v4-pro
  - deepseek/deepseek-v4-flash
  - google/gemini-3.1-pro-preview
  - google/gemini-3.5-flash
  - google/gemini-3.1-flash-lite
  - minimax/minimax-m3
  - moonshotai/kimi-k2.7-code
  - z-ai/glm-4.7
  - z-ai/glm-5.2
  - openai/gpt-5.5
  - openai/gpt-5.4-mini
